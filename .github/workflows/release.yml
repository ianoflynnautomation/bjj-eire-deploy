name: Release — Charts

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      push:
        description: "Push charts to GHCR (default: lint only)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  HELM_VERSION: "3.16.4"

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      umbrella_released: ${{ steps.release.outputs['bjj-eire--release_created'] }}
      umbrella_version:  ${{ steps.release.outputs['bjj-eire--version'] }}
      umbrella_tag:      ${{ steps.release.outputs['bjj-eire--tag_name'] }}
      api_released:      ${{ steps.release.outputs['bjj-eire-api--release_created'] }}
      api_version:       ${{ steps.release.outputs['bjj-eire-api--version'] }}
      mongodb_released:  ${{ steps.release.outputs['bjj-eire-mongodb--release_created'] }}
      mongodb_version:   ${{ steps.release.outputs['bjj-eire-mongodb--version'] }}
      web_released:      ${{ steps.release.outputs['bjj-eire-web--release_created'] }}
      web_version:       ${{ steps.release.outputs['bjj-eire-web--version'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  push-api:
    name: Push bjj-api chart
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - run: helm package bjj-eire-api/artifact --destination /tmp/charts
      - run: |
          helm push /tmp/bjj-api-${{ needs.release-please.outputs.api_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OWNER }}

  push-mongodb:
    name: Push bjj-mongodb chart
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.mongodb_released == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - run: helm package bjj-eire-mongodb/artifact --destination /tmp/charts
      - run: |
          helm push /tmp/bjj-mongodb-${{ needs.release-please.outputs.mongodb_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OWNER }}

  push-web:
    name: Push bjj-frontend chart
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.web_released == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - run: helm package bjj-eire-web/artifact --destination /tmp/charts
      - run: |
          helm push /tmp/bjj-frontend-${{ needs.release-please.outputs.web_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OWNER }}

  push-umbrella:
    name: Push bjj-eire umbrella chart
    runs-on: ubuntu-latest
    needs: [release-please, push-api, push-mongodb, push-web]
    if: |
      always() &&
      needs.release-please.outputs.umbrella_released == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - name: Build umbrella dependencies
        run: helm dependency build bjj-eire/artifact
      - name: Package & push
        run: |
          helm package bjj-eire/artifact --destination /tmp/charts
          helm push /tmp/bjj-eire-${{ needs.release-please.outputs.umbrella_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OWNER }}
      - name: Summary
        run: |
          echo "## Chart Published" >> $GITHUB_STEP_SUMMARY
          echo "oci://${{ env.REGISTRY }}/${{ env.OWNER }}/bjj-eire:${{ needs.release-please.outputs.umbrella_version }}" >> $GITHUB_STEP_SUMMARY


