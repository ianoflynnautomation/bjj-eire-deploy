bjj-mongodb:
  mongodb:
    image:
      tag: "7.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 1000m
        memory: 1Gi
    persistence:
      storageClassName: managed-premium
      size: 50Gi
bjj-api:
  api:
    image:
      repository: ghcr.io/ianoflynnautomation/bjjeire-api
      pullPolicy: IfNotPresent
      tag: ""
    replicaCount: 2
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"
      prometheus.io/port: "80"
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "https://+:443;http://+:80"
      ASPNETCORE_HTTP_PORT: "80"
      ASPNETCORE_HTTPS_PORT: "443"
      ASPNETCORE_KESTREL_CERT_PATH: "/https/aspnetapp.pfx"
      CorsOptions__AllowedOrigins: "https://bjjeire.com,https://www.bjjeire.com"
      CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
      CorsOptions__AllowedHeaders: "Authorization,Content-Type"
      RateLimitOptions__EnableRateLimiting: "true"
      RateLimitOptions__PermitLimit: "5"
      RateLimitOptions__WindowInSeconds: "10"
      RateLimitOptions__RejectionStatusCode: "429"
      CacheOptions__DefaultExpirationMinutes: "5"
      ServiceDefaults__ServiceName: "BjjEire.Api"
      ServiceDefaults__EnablePrometheus: "true"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      AzureAd__TenantId: ""
      AzureAd__ClientId: ""
      AzureAd__Audience: ""
      Serilog__Properties__Application: "BjjWorld.Api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.bjjeire.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-prod-api-tls
        hosts:
          - api.bjjeire.com
bjj-frontend:
  frontend:
    image:
      repository: ghcr.io/ianoflynnautomation/bjjeire-frontend
      pullPolicy: IfNotPresent
      tag: ""
    replicaCount: 2
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"
      prometheus.io/port: "80"
    env:
      NODE_ENV: production
      PORT: "80"
      SERVICES_API_HTTPS_0: "https://bjj-api:443"
      SERVICES_API_HTTP_0: "http://bjj-api:80"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: bjjeire.com
        paths:
          - path: /
            pathType: Prefix
      - host: www.bjjeire.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-prod-frontend-tls
        hosts:
          - bjjeire.com
          - www.bjjeire.com
seeder:
  image:
    repository: ghcr.io/ianoflynnautomation/bjjeire-seeder
    pullPolicy: IfNotPresent
    tag: "0.1.8"
