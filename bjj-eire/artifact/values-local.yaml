# ============================================================
# Local / Minikube overrides
# Mirrors appsettings.Development.json + local .env settings.
# Usage:
#   helm upgrade --install bjj-eire . -f values.yaml -f values-local.yaml \
#     --set bjj-api.secrets.mongodbRootPassword.value=$(base64 -i secrets/mongodb_password.txt)
# ============================================================

bjj-mongodb:
  mongodb:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    persistence:
      storageClassName: standard
      size: 2Gi

bjj-api:
  api:
    image:
      repository: bjj-api
      tag: "local"
      pullPolicy: Never   
    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "https://+:443;http://+:80"
      ASPNETCORE_HTTP_PORT: "80"
      ASPNETCORE_HTTPS_PORT: "443"
      ASPNETCORE_KESTREL_CERT_PATH: "/https/aspnetapp.pfx"
      CorsOptions__AllowedOrigins: "https://localhost:5173,http://localhost:5173,https://app.bjj.local,http://app.bjj.local"
      CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
      CorsOptions__AllowedHeaders: "Authorization,Content-Type"
      RateLimitOptions__EnableRateLimiting: "false"
      RateLimitOptions__PermitLimit: "5"
      RateLimitOptions__WindowInSeconds: "10"
      RateLimitOptions__RejectionStatusCode: "429"
      CacheOptions__DefaultExpirationMinutes: "5"
      ServiceDefaults__ServiceName: "BjjEire.Api"
      ServiceDefaults__EnablePrometheus: "false"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      AzureAd__TenantId: ""
      AzureAd__ClientId: ""
      AzureAd__Audience: ""
      Serilog__Properties__Application: "BjjWorld.Api"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  ingress:
    hosts:
      - host: api.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - api.bjj.local

bjj-frontend:
  frontend:
    image:
      repository: bjj-frontend
      tag: "local"
      pullPolicy: Never
    env:
      NODE_ENV: production
      PORT: "80"
      SERVICES_API_HTTPS_0: "https://bjj-api:443"
      SERVICES_API_HTTP_0: "http://bjj-api:80"
    autoscaling:
      enabled: false
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    waitForApi:
      enabled: false

  ingress:
    hosts:
      - host: app.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - app.bjj.local
